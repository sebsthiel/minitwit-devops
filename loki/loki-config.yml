# Grafana loki configuration example: https://grafana.com/docs/loki/latest/configure/examples/configuration-examples/
auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki                    # Base directory where Loki stores all its data (indexes, chunks, rules) which is the persistent loki volume mounted to the container in the docker-compose.yml file
  storage:
    filesystem:
      chunks_directory: /loki/chunks    # Directory to store chunks in
      rules_directory: /loki/rules      # Directory to store rules in.
  replication_factor: 1                 # How many copies of each log chunk are kept
  ring:
    kvstore:
      store: inmemory

# Can define multiple stores if data changes over time.
schema_config:
  configs:
    - from: "2026-03-25"
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        period: 24h
        prefix: index_

limits_config:
  #reject_old_samples: true             # Defaulted to true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: false      # I think this makes it so no extra labels are created from key-value pais in the log.