services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: minitwit_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d minitwit_test"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  minitwit-app:
    image: ${MINITWIT_IMAGE:-marcp85/minitwitimage:latest}
    environment:
      DATABASE_PATH: postgresql://test:test@db:5432/minitwit_test
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
