---
name: CI/CD Testsuite

on:
  workflow_dispatch:
  push:
    branches: [feature/testsuite]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: minitwit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d minitwit_test"
          --health-interval=10s --health-timeout=5s --health-retries=5

    env:
      DATABASE_PATH: postgresql://test:test@localhost:5432/minitwit_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y firefox geckodriver

      - name: Install python deps
        run: python -m pip install --upgrade pip && pip install pytest selenium psycopg2-binary

      - name: Init schema
        run: |
          python - <<'PY'
          import os, psycopg2
          dsn = os.environ["DATABASE_PATH"]
          with open("schema.sql","r",encoding="utf-8") as f:
            sql = f.read()
          conn = psycopg2.connect(dsn)
          conn.autocommit = True
          with conn.cursor() as cur:
            cur.execute(sql)
          conn.close()
          PY

      - name: Start app
        run: |
          nohup env DATABASE_PATH="$DATABASE_PATH" go run . >/tmp/minitwit.log 2>&1 &
          sleep 5

      - name: Run UI tests
        run: pytest test/test_itu_minitwit_ui.py
