---
name: CI/CD Testsuite

on:
  workflow_dispatch:
  push:
    branches: [feature/testsuite]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_PATH: postgresql://test:test@localhost:5432/minitwit_test
      MINITWIT_IMAGE: ${{ secrets.DOCKER_USERNAME }}/minitwitimage:latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y firefox firefox-geckodriver

      - name: Install python deps
        run: python -m pip install --upgrade pip && pip install pytest selenium psycopg2-binary

      - name: Start dockerized app
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --pull always

      - name: Wait for app
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:5001/ && exit 0
            sleep 2
          done
          exit 1

      - name: Run UI tests
        run: pytest test/test_itu_minitwit_ui.py
