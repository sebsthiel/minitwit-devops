---
name: CI/CD Testsuite

on:
  workflow_dispatch:
  push:
    branches: [feature/testsuite]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_PATH: postgresql://test:test@localhost:5432/minitwit_test
      MINITWIT_IMAGE: ${{ secrets.DOCKER_USERNAME }}/minitwitimage:latest
      GECKODRIVER_PATH: /usr/local/bin/geckodriver

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install geckodriver
        run: |
          GECKODRIVER_VERSION=0.34.0
          curl -sSL -o /tmp/geckodriver.tar.gz \
            "https://github.com/mozilla/geckodriver/releases/download/v${GECKODRIVER_VERSION}/geckodriver-v${GECKODRIVER_VERSION}-linux64.tar.gz"
          tar -xzf /tmp/geckodriver.tar.gz -C /tmp
          sudo mv /tmp/geckodriver /usr/local/bin/geckodriver
          sudo chmod +x /usr/local/bin/geckodriver

      - name: Install python deps
        run: python -m pip install --upgrade pip && pip install pytest selenium psycopg2-binary

      - name: Start postgres and app containers
        run: |
          docker network create minitwit_net
          docker run -d --name pg --network minitwit_net \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=minitwit_test \
            -p 5432:5432 \
            postgres:16

          for i in {1..30}; do
            docker exec pg pg_isready -U test -d minitwit_test && break
            sleep 2
          done

          docker run -d --name minitwit --network minitwit_net \
            -e DATABASE_PATH=postgresql://test:test@pg:5432/minitwit_test \
            -p 5001:5001 \
            "$MINITWIT_IMAGE"

      - name: Wait for app
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:5001/ && exit 0
            sleep 2
          done
          exit 1

      - name: Debug container logs
        if: failure()
        run: |
          docker ps -a
          docker logs --tail=200 minitwit

      - name: Run UI tests
        run: pytest test/test_itu_minitwit_ui.py
