---
name: Simulator API Tests

on:
  workflow_dispatch:
  push:
    branches: [feature/testsuite]

jobs:
  simulator-api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python deps
        run: python -m pip install --upgrade pip && pip install pytest requests psycopg2-binary traceback os csv sys json http socket base64 requests time datetime contextlib sqlite3

      - name: Start latest minitwit image
        run: |
          docker run -p 5001:5001 -v /data:/data -e DATABASE_PATH=${DATABASE_PATH} ${MINITWIT_IMAGE:-marcp85/minitwitimage:latest}

      - name: Wait for app
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:5001/ && exit 0
            sleep 2
          done
          exit 1

      - name: Run minitwit simulator API tests
        run: pytest test/minitwit_sim_api_test.py
