---
name: Simulator API Tests test

on:
  workflow_dispatch:
  push:
    branches: [feature/testsuite]

jobs:
  simulator-api-tests:
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
      SIMULATOR_AUTH: ${{ secrets.SIMULATOR_AUTH }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Build and run app
        run: make runlocal

      - name: Wait for app
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:5001/ && exit 0
            sleep 2
          done
          exit 1

      - name: Run minitwit simulator API tests
        run: pytest test/minitwit_sim_api_test.py
