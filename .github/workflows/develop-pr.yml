name: PR Quality Gate

on:
  pull_request:
    branches:
      - develop

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
            go-version: '1.25'   

      - name: Quality checks - Static analysis
        run: make all

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build ./...