name: PR Quality Gate

on:
  pull_request:
    branches:
      - develop

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Quality checks - Static analysis
        run: make all

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build ./...
      
      - name: Scan Docker image with Trivy
        run: |
          docker build -t minitwit-api:test -f Dockerfile.api .
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image --exit-code 1 --severity HIGH,CRITICAL minitwit-api:test

  tests:
    needs: quality-gate
    uses: ./.github/workflows/merged-tests.yml
    secrets: inherit 