name: PR Quality Gate

on:
  pull_request:
    branches:
      - develop

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Quality checks - Static analysis
        run: make all

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build ./...
      
      - name: Build Docker image
        run: docker build -t minitwit-api:test -f Dockerfile.api .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: minitwit-api:test
          severity: HIGH,CRITICAL
          ignorefile: .trivyignore
          exit-code: '1'

  tests:
    needs: quality-gate
    uses: ./.github/workflows/merged-tests.yml
    secrets: inherit 