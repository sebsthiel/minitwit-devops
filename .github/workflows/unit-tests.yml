---
name: Unit Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_PATH: postgresql://test:test@postgres:5432/minitwit_test
      DATABASE_PATH_DOCKER: postgresql://test:test@postgres:5432/minitwit_test
      SIMULATOR_AUTH: test-token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install python deps
        run: python -m pip install --upgrade pip && pip install pytest requests psycopg2-binary

      - name: Start postgres and minitwit containers
        run: |
          docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for app
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:5001/ && exit 0
            sleep 2
          done
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs --no-color

      - name: Run refactored tests
        run: pytest test/refactored_minitwit_tests.py
