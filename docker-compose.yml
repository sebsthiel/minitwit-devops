services:
  api:
    image: ${MINITWIT_IMAGE:-marcp85/minitwitapiimage:latest}
    container_name: minitwit-api
    ports:
      - "5001:5001"
    environment:
      - DATABASE_PATH=${DATABASE_PATH}
      - LOG_LEVEL=${LOG_LEVEL}
      - SIMULATOR_AUTH=${SIMULATOR_AUTH}
    networks:
      - minitwit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: ${MINITWIT_IMAGE:-marcp85/minitwitwebimage:latest}
    container_name: minitwit-web
    ports:
      - "5000:5000"
    environment:
      - DATABASE_PATH=${DATABASE_PATH}
      - LOG_LEVEL=${LOG_LEVEL}
      - SIMULATOR_AUTH=${SIMULATOR_AUTH}
    networks:
      - minitwit-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:  # Network shared between services so we can refer to them by name
  minitwit-network:
    external: true
    name: minitwit-network

volumes:
  grafana-storage:
  loki-storage: