services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=minitwit
      - POSTGRES_USER=minitwit_user
      - POSTGRES_PASSWORD=mypassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minitwit_user -d minitwit"]
      interval: 10s
      timeout: 5s
      retries: 5

  minitwit-app:
    image: marcp85/minitwitimage:latest
    ports:
      - "5001:5001"
    volumes:
      - /data:/data
    environment:
      - DATABASE_PATH=postgres://minitwit_user:mypassword123@postgres:5432/minitwit?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - minitwit-app

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - postgres

volumes:
  postgres_data: