services:
  api:
    image: ${MINITWIT_API_IMAGE:-marcp85/minitwit-api:latest}
    container_name: minitwit-api
    ports:
      - "5001:5001"
    volumes:
      - /data:/data
    environment:
      DATABASE_PATH: ${DATABASE_PATH}
      LOG_LEVEL: ${LOG_LEVEL}
      SIMULATOR_AUTH: ${SIMULATOR_AUTH}
    networks:
      - minitwit-network
    restart: unless-stopped

  web:
    image: ${MINITWIT_WEB_IMAGE:-marcp85/minitwit-web:latest}
    container_name: minitwit-web
    ports:
      - "5000:5000"
    environment:
      API_BASE_URL: http://api:5001
      SESSION_KEY: ${SESSION_KEY}
    depends_on:
      - api
    networks:
      - minitwit-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
      - web
    networks:
      - minitwit-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - grafana-storage:/var/lib/grafana
    networks:
      - minitwit-network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    volumes:
      - loki-storage:/loki
      - ./loki/loki-config.yml:/mnt/config/loki-config.yml # Mount the loki config file.
    command: -config.file=/mnt/config/loki-config.yml
    ports:
      - "3100:3100"
    networks:
      - minitwit-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/mnt/config/promtail-config.yml # Mount the promtail-config.yml file.
      - /var/run/docker.sock:/var/run/docker.sock # Mounting the log directory from host.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro # Mounting the log directory from host.
    command: -config.file=/mnt/config/promtail-config.yml
    depends_on:
      - loki
    networks:
      - minitwit-network
    restart: unless-stopped

networks: # Network shared between services so we can refer to them by name
  minitwit-network:
    external: false
    name: minitwit-network

volumes:
  grafana-storage:
  loki-storage: