services:
  api:
    image: ${MINITWIT_IMAGE:-marcp85/minitwitapiimage:latest}
    ports:
      - target: 5001   # Remove this when simulator uses the reverse proxy endpoint
        published: 5001
    environment:
      - DATABASE_PATH=${DATABASE_PATH}
      - LOG_LEVEL=${LOG_LEVEL}
      - SIMULATOR_AUTH=${SIMULATOR_AUTH}
    networks:
      - minitwit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  web:
    image: ${MINITWIT_IMAGE:-marcp85/minitwitwebimage:latest}
    ports:
      - target: 5000 # Remove this when simulator uses the reverse proxy endpoint
        published: 5000 
    environment:
      - DATABASE_PATH=${DATABASE_PATH}
      - LOG_LEVEL=${LOG_LEVEL}
      - SIMULATOR_AUTH=${SIMULATOR_AUTH}
    networks:
      - minitwit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:latest
    ports:
      - target: 80
        published: 80
      #- target: 443 Enable when TLS is set
      #  published: 443 Enable when TLS is set
    volumes:
      #- /etc/letsencrypt:/etc/letsencrypt:ro Enable this when TLS is set
      - ./nginx.develop.conf:/etc/nginx/nginx.conf:ro # Remove .develop when TLS is set
    networks:
      - minitwit-network
    deploy:
      placement:
        constraints:
          - node.role == manager

networks:  # Network shared between services so we can refer to them by name
  minitwit-network:
    external: true
    name: minitwit-network

volumes:
  grafana-storage:
  loki-storage: