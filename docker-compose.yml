services:
  minitwit-app:
    image: marcp85/minitwitimage:latest
    ports:
      - "5001:5001"
    volumes:
      - /data:/data
    environment:
      - DATABASE_PATH=${DATABASE_PATH}

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - minitwit-app

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001"]
      interval: 30s
      timeout: 10s
      retries: 3
