services:
  api:
    image: ${MINITWIT_IMAGE:-marcp85/minitwitapiimage:latest}
    environment:
      - DATABASE_PATH=${DATABASE_PATH}
      - LOG_LEVEL=${LOG_LEVEL}
      - SIMULATOR_AUTH=${SIMULATOR_AUTH}
    networks:
      - minitwit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 6
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback

  web:
    image: ${MINITWIT_IMAGE:-marcp85/minitwitwebimage:latest}
    environment:
      - DATABASE_PATH=${DATABASE_PATH}
      - LOG_LEVEL=${LOG_LEVEL}
      - SIMULATOR_AUTH=${SIMULATOR_AUTH}
    networks:
      - minitwit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback

  nginx:
    image: nginx:latest
    ports:
      - target: 80
        published: 80
      - target: 443
        published: 443
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - minitwit-network
    deploy:
      placement:
        constraints:
          - node.role == manager

networks:  # Network shared between services so we can refer to them by name
  minitwit-network:
    external: true
    name: minitwit-network

volumes:
  grafana-storage:
  loki-storage:
