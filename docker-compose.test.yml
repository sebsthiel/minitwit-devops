services:
  minitwit-app:
    environment:
      - DATABASE_PATH=postgresql://test:test@postgres:5432/minitwit_test
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: minitwit_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d minitwit_test"]
      interval: 10s
      timeout: 5s
      retries: 5
