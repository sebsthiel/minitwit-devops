services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: minitwit_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d minitwit_test"]
      interval: 5s
      timeout: 3s
      retries: 30

  minitwit-app:
    image: ${MINITWIT_IMAGE:-marcp85/minitwitimage:latest}
    ports:
      - "5001:5001"
    environment:
      - DATABASE_PATH=${DATABASE_PATH_DOCKER}
      - SIMULATOR_AUTH=${SIMULATOR_AUTH}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy


  