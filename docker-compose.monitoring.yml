services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - target: 9090
        published: 9090
        protocol: tcp
        mode: host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - minitwit-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana:latest
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: host
    depends_on:
      - prometheus
    volumes:
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - grafana-storage:/var/lib/grafana
    networks:
      - minitwit-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  loki:
    image: grafana/loki:latest
    volumes:
      - loki-storage:/loki
      - ./loki/loki-config.yml:/mnt/config/loki-config.yml  # Mount the loki config file
    command: -config.file=/mnt/config/loki-config.yml
    ports:
      - target: 3100
        published: 3100
        protocol: tcp
        mode: host
    networks:
      - minitwit-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./promtail/promtail-config.yml:/mnt/config/promtail-config.yml  # Mount the promtail config file
      - /var/run/docker.sock:/var/run/docker.sock                        # Mounting the docker socket
      - /var/lib/docker/containers:/var/lib/docker/containers:ro         # Mounting the log directory from host
    command: -config.file=/mnt/config/promtail-config.yml
    depends_on:
      - loki
    networks:
      - minitwit-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:  # Network shared between services so we can refer to them by name
  minitwit-network:
    external: true
    name: minitwit-network


volumes:
  grafana-storage:
  loki-storage: